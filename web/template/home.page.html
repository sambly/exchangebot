{{template "base" . }}


{{define "content"}}


<div class="container">


  <div class="row mt-5">
    <div class="col-2">
      <select name="pairs" id="pairs" class="form-select"></select>
    </div>
  </div>

  <div class = "button-control mt-5">
    <button type="button" class="btn btn-light" id = "btn-price">Цена</button>
    <button type="button" class="btn btn-light" id = "btn-volume">Объем </button>
    <button type="button" class="btn btn-light" id = "btn-volume-update">Обновить </button>
  </div>

  <div class="row mt-3">         
      <div class="col-4">
        <div id = "ch_price"> 
          <div class="tickers-list">
            <div class="scroll-table table-sm" style="overflow-x:auto;" >  
              <table class="table table-hover table-borderless">
                <thead style="background-color: rgb(239, 239, 239);">
                  <tr>
                    <th scope="col">
                      Пара
                    </th>
                    <th scope="col">
                      ch3m
                    </th>
                    <th scope="col">
                      ch15m
                    </th>
                    <th scope="col">
                      ch1
                    </th>
                    <th scope="col">
                      ch4
                    </th>
                  </tr>
                </thead>    
                <tbody></tbody>
              </table>
            </div> 
          </div>
        </div>

        <div id = "ch_volume"> 

          <div class = "buttons-frame mt-1">
            <div class="d-flex justify-content-end">
              <button type="button" class="btn btn-light  btn-sm" id = "btn-price">5m</button>
              <button type="button" class="btn btn-light  btn-sm" id = "btn-volume">30m </button>
              <button type="button" class="btn btn-light  btn-sm" id = "btn-volume-update">1h </button>
              <button type="button" class="btn btn-light  btn-sm" id = "btn-volume-update">4h </button>
              <button type="button" class="btn btn-light  btn-sm" id = "btn-volume-update">1d </button>
            </div>
          </div>

          <div class="tickers-list  mt-1">
            <div class="scroll-table table-sm" style="overflow-x:auto;" >  
              <table class="table table-hover table-borderless">
                <thead style="background-color: rgb(239, 239, 239);">
                  <tr>
                    <th scope="col">
                      Пара
                    </th>
                    <th scope="col">
                      Объем
                    </th>
                    <th scope="col">
                      Сделки
                    </th>
                  </tr>
                </thead>    
                <tbody></tbody>
              </table>
            </div> 
          </div>
        </div>

      </div>

      <div class="col-8">
        <div class="chart">

            <div class="tradingview-widget-container tech_analysis">
              <div id="tradingview_3418f"></div>
              <div class="tradingview-widget-copyright">
            </div>

            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
              new TradingView.widget(
              {
                "height": "500",
                "symbol": "BINANCE:BTCUSDT",
                "interval": "15",
                "timezone": "Europe/Moscow",
                "theme": "Light",
                "style": "1",
                "locale": "ru",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_3418f"
              });
                  </script>
            </div>


        </div>
      </div>

  </div>

</div>

<script>
  forming_page({{ .Pairs}},{{ .ChangePrices}}); 
</script>


{{end}}
