name: exchangebot-base

services:
  exchangebot:
    container_name: exchangebot  
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        VITE_GRAFANA_URL: ${VITE_GRAFANA_URL:-grafana}
    image: sambly/exchangebot:${EXCHANGE_BOT_TAG:-latest}  
    ports:
      - "${HOST_PORT:-8080}:${CONTAINER_PORT:-80}"
    volumes:
      - ./log:/app/log 
      - ./configs:/app/configs      
    environment:
      ENVIRONMENT: docker
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - exchange
    
  mysql:
    container_name: mysql  
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST:-3307}:${DB_PORT:-3306}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql --silent -u root -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 100s        
    networks:
      - exchange

  prometheus:
    container_name: prometheus  
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - exchange

  grafana:
    container_name: grafana    
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - exchange

volumes:
  mysql_data:

networks:
  exchange:
    driver: bridge