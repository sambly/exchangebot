version: '3.8'

services:
  exchange_app:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        BUILD_TARGET: ${BUILD_TARGET:-ncli}
        VITE_GRAFANA_URL: ${VITE_GRAFANA_URL:-grafana}
    ports:
      - "${HOST_PORT:-8080}:${CONTAINER_PORT:-80}"
    volumes:
      - ./log:/app/log 
    environment:
      ENVIRONMENT: docker
      CONTENT_EMBED: true
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
    - exchange
    
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST:-3307}:${DB_PORT:-3306}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - exchange

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - exchange

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - exchange

volumes:
  mysql_data:

networks:
  exchange:
    driver: bridge