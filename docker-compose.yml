version: '3.8'

services:
  exchange_app:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        ENVIRONMENT: docker
        BUILD_TARGET: "exchange" 
    ports:
      - "8080:80" 
    volumes:
      - ./log:/app/log 
    environment:
      ENVIRONMENT: docker
      CONTENT_EMBED: true
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: