<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App</title>

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./scss/styles.scss">



  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" /> -->

  <!-- <script src="https://code.jquery.com/jquery-3.6.0.min.js"
    integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script> -->
  <script type="text/javascript"
    src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://use.fontawesome.com/4f45749bd3.js"></script>



  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script> -->

</head>

<body>

  <div class="container-fluid">



    <div class=" d-flex gap-3 mt-3">
      <div class="d-flex gap-1">24часа:<div class="text-primary" id="ch24-top" style="font-weight: bold; "></div>
      </div>
      <div class="d-flex gap-1">Объем:<div class="text-primary" id="volume-top" style="font-weight: bold; "></div>
      </div>
    </div>



    <div class="row mt-3">
      <div class="col-2">
        <input class="form-control" list="pairslistOptions" id="pairs" placeholder="Pair to search...">
        <datalist id="pairslistOptions">
        </datalist>
      </div>
    </div>

    <div class="button-control mt-3">
      <button type="button" class="btnMenu btn btn-secondary active" id="btn-price">Цена</button>
      <button type="button" class="btnMenu btn btn-secondary" id="btn-volume">Объем </button>
      <button type="button" class="btn btn-secondary" data-bs-toggle="collapse" id="btn-update-data">Обновить </button>
    </div>

    <div class="row mt-3">

      <div class="col-3">

        <div class="bg-light border rounded-3">
          <div id="list">

            <div id="list-top" class="px-2 pt-2">

              <div class="d-flex gap-1 justify-content-end">
                <div class="btn-group" role="group">
                  <button type="button" class="btnPairs btn btn-secondary btn-sm active" id="btnAllPairs">Все</button>
                  <button type="button" class="btnPairs btn-secondary btn-sm" id="btnFavoritePairs">♥</button>
                </div>

                <div class="collapse" id="group-btn-frame">
                  <div class="btn-group" role="group">
                    <button type="button" class="btnFrame btn btn-secondary active  btn-sm">1m</button>
                    <button type="button" class="btnFrame btn btn-secondary  btn-sm">5m</button>
                    <button type="button" class="btnFrame btn btn-secondary  btn-sm">30m </button>
                    <button type="button" class="btnFrame btn btn-secondary  btn-sm">1h </button>
                    <button type="button" class="btnFrame btn btn-secondary  btn-sm">4h </button>
                    <button type="button" class="btnFrame btn btn-secondary  btn-sm">1d </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="collapse" id="list-ch-price">
              <table id="table-price" class="table table-hover table-borderless ">
                <thead name="thead-price" class="thead-dark">
                  <tr>
                    <th scope="col">
                      ✓
                    </th>
                    <th scope="col">
                      Пара
                    </th>
                    <th scope="col">
                      сh24V
                    </th>
                    <th scope="col">
                      ch3m
                    </th>
                    <th scope="col">
                      ch15m
                    </th>
                    <th scope="col">
                      ch1
                    </th>
                    <th scope="col">
                      ch4
                    </th>
                  </tr>
                </thead>
                <tbody id="tbody-price"></tbody>
              </table>
            </div>

            <div class="collapse" id="list-ch-volume">

              <table id="table-delta" class="table table-hover table-borderless">
                <thead name="thead-delta" style="background-color:#f8f9fa">
                  <tr>
                    <th scope="col" class="delta-col1">
                      ✓
                    </th>
                    <th scope="col" class="delta-col2">
                      Пара
                    </th>
                    <th scope="col" class="delta-col3">
                      Объем
                    </th>
                    <th scope="col" class="delta-col4">
                      ОбъемБ
                    </th>
                    <th scope="col" class="delta-col5">
                      ОбъемА
                    </th>
                    <th scope="col" class="delta-col6">
                      Сделки
                    </th>
                    <th scope="col" class="delta-col7">
                      СделкиА
                    </th>
                    <th scope="col" class="delta-col8">
                      СделкиB
                    </th>
                  </tr>
                </thead>
                <tbody id="tbody-delta"></tbody>
              </table>

            </div>

          </div>
        </div>
      </div>

      <div class="col-6">
        <div class="bg-light border rounded-3">
          <div class="collapse chart" id="chart-price">

            <div class="tradingview-widget-container tech_analysis">

              <div id="tradingview_3418f"></div>
              <div class="tradingview-widget-copyright"></div>

              <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

            </div>
          </div>

          <div class="collapse chart" id="panel-chart-volume">

            <div class="d-flex gap-1 justify-content-end px-5 pt-2">
              <input class="form-check-input" type="checkbox" name="change-delta-check" value="Volume" checked>
              <label class="form-check-label" for="checkVolume"> Volume</label>

              <input class="form-check-input" type="checkbox" name="change-delta-check" value="VolumeBuy">
              <label class="form-check-label" for="checkVolumeB"> VolumeB</label>

              <input class="form-check-input" type="checkbox" name="change-delta-check" value="VolumeAsk">
              <label class="form-check-label" for="checkVolumeA"> VolumeA</label>

              <input class="form-check-input" type="checkbox" name="change-delta-check" value="Trades">
              <label class="form-check-label" for="checkTrades"> Trades</label>

              <input class="form-check-input" type="checkbox" name="change-delta-check" value="TradesBuy">
              <label class="form-check-label" for="checkTradesB"> TradesB</label>

              <input class="form-check-input" type="checkbox" name="change-delta-check" value="TradesAsk">
              <label class="form-check-label" for="checkTradesA"> TradesA</label>

            </div>

            <div id="chart-volume">
            </div>
          </div>

          <div class="collapse chart" id="panel-chart-orders">

            <div id="chart-orders">
            </div>
          </div>
        </div>

      </div>

      <div class="col-3">

        <div class="bg-light border rounded-3">
          <div id="smart-trade" style="height: 500px;">
            <div class="d-flex gap-1 px-2 pt-2 justify-content-end">
              <div class="btn-group " role="group">
                <button type="button" class="btnFrameStrategy btn btn-secondary  btn-sm">1m</button>
                <button type="button" class="btnFrameStrategy btn btn-secondary  btn-sm">15m </button>
                <button type="button" class="btnFrameStrategy btn btn-secondary  btn-sm">1h </button>
                <button type="button" class="btnFrameStrategy btn btn-secondary  btn-sm">4h </button>
                <button type="button" class="btnFrameStrategy btn btn-secondary  btn-sm">1d </button>
              </div>
            </div>


            <div class="mb-3 px-2">
              <label for="panel-trade-strategy" class="form-label">Стратегия:</label>
              <select name="panel-trade-strategy" id="panel-trade-strategy" class="form-select">
              </select>
            </div>


            <div class="mb-3 px-2">
              <label for="panel-trade-comment" class="form-label">Коментарий:</label>
              <textarea class="form-control" id="panel-trade-comment" rows="3" name="text_comment"></textarea>
            </div>

            <div class="d-flex gap-3 justify-content-center mb-3">
              <button type="button" class="btn-trade-deal btn btn-secondary" id="panel-trdae-open-deal">Покупка</button>
              <button type="button" class="btn-trade-deal btn btn-secondary"
                id="panel-trdae-close-deal">Продажа</button>
            </div>

          </div>
        </div>
      </div>
    </div>


    <div class="row mt-3">
      <div class="button-control">
        <button type="button" class="btnTradeHistory btn btn-secondary active" id="btn-trade-active">Активные</button>
        <button type="button" class="btnTradeHistory btn btn-secondary" id="btn-trade-history">История </button>
      </div>

    </div>


    <div class="row mt-1">

      <div class="col-9">
        <div class="bg-light border rounded-3" style="height: 400px;">
          <div class="panel-trade mt-3">

            <div class="collapse" id="panel-trade-active">
              <table id="table-trade-active" class="table table-hover table-borderless ">
                <thead name="thead-trade-active" style="background-color:#f8f9fa">
                  <tr>
                    <th scope="col">
                      Тип
                    </th>
                    <th scope="col">
                      Пара
                    </th>
                    <th scope="col">
                      Цена
                    </th>
                    <th scope="col">
                      Профит
                    </th>
                    <th scope="col">
                      Дата
                    </th>
                    <th scope="col">
                      Закрыть
                    </th>
                  </tr>
                </thead>
                <tbody id="tbody-trade-active"></tbody>
              </table>
            </div>

            <div class="collapse" id="panel-trade-history">
              <table id="table-trade-history" class="table table-hover table-borderless ">
                <thead name="thead-trade-history" style="background-color:#f8f9fa">
                  <tr>
                    <th scope="col">
                      Тип
                    </th>
                    <th scope="col">
                      Пара
                    </th>
                    <th scope="col">
                      Цена
                    </th>
                    <th scope="col">
                      Дата
                    </th>
                    <th scope="col">
                      Профит
                    </th>
                  </tr>
                </thead>
                <tbody id="tbody-trade-history"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>




    <div class="toast align-items-center bg-light" role="alert" aria-live="assertive" aria-atomic="true" id="toast">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
      </div>
    </div>


  </div>




  <script type="module" src="./js/main.js"></script>

</body>

</html>
